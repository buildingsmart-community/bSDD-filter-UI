# Workflow for deploying static content to GitHub Pages
name: Deploy bSDD-filter-UI to GitHub Pages

on:
  # The workflow triggers on pushes to the main branch and on creation of any tag
  push:
    branches: ["main"]
    tags: ["*"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Deploy job with two steps: one for main branch, one for release tags
  deploy:
    environment:
      name: github-pages
      url: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && 'https://buildingsmart-community.github.io/bSDD-filter-UI/main/' || startsWith(github.ref, 'refs/tags/') && format('https://buildingsmart-community.github.io/bSDD-filter-UI/{0}', github.ref_name) || 'https://buildingsmart-community.github.io/bSDD-filter-UI/' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies and build
        env:
          BASE_PATH: '/bSDD-filter-UI/${{ github.ref_name }}/'
          VITE_APP_VERSION: ${{ github.ref == 'refs/heads/main' && env.VITE_APP_VERSION || github.ref_name }}
          # Client ID is a public SPA client (no secret) — embedded here for convenience.
          # Override with a GitHub secret if you register a separate app per environment.
          VITE_BSDD_CLIENT_ID: 'ba6a70eb-8e2d-4caa-ae3d-22fc1765c0a5'
          # Production scope — override with VITE_BSDD_SCOPE secret for test deployments
          VITE_BSDD_SCOPE: 'https://buildingSMARTservices.onmicrosoft.com/bsddapi/read'
          # Fixed redirect URI — all versioned deployments share this one registered URI
          VITE_BSDD_REDIRECT_URI: 'https://buildingsmart-community.github.io/bSDD-filter-UI/'
        run: |
          yarn install
          yarn run build

      - name: Prepare deploy folder (main)
        if: github.ref == 'refs/heads/main'
        run: |
          mkdir -p deploy-main/main
          cp -r dist/. deploy-main/main/
          cat > deploy-main/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
            <head><title>bSDD filter UI</title></head>
            <body>
              <script type="module">
                // Handles the MSAL redirect flow. After B2C redirects here, MSAL
                // processes the auth code and navigates back to the versioned app
                // URL stored in sessionStorage (navigateToLoginRequestUrl: true).
                // Uses ESM import — MSAL v5 no longer ships a UMD/global bundle.
                import { PublicClientApplication } from 'https://cdn.jsdelivr.net/npm/@azure/msal-browser@5.9.0/+esm';
                const app = new PublicClientApplication({
                  auth: {
                    clientId: 'ba6a70eb-8e2d-4caa-ae3d-22fc1765c0a5',
                    redirectUri: window.location.href.split('?')[0].split('#')[0],
                  },
                });
                await app.initialize();
                await app.handleRedirectPromise();
              </script>
            </body>
          </html>
          EOF

      - name: Deploy to GitHub Pages (main)
        if: github.ref == 'refs/heads/main'
        uses: JamesIves/github-pages-deploy-action@v4.5.0
        with:
          branch: gh-pages
          folder: deploy-main
          target-folder: .
          clean: true
          clean-exclude: |
            v[0-9]*
            latest

      - name: Deploy to GitHub Pages (latest release)
        if: startsWith(github.ref, 'refs/tags/')
        uses: JamesIves/github-pages-deploy-action@v4.5.0
        with:
          branch: gh-pages
          folder: dist
          target-folder: latest
          clean: true

      - name: Deploy to GitHub Pages (specific release)
        if: startsWith(github.ref, 'refs/tags/')
        uses: JamesIves/github-pages-deploy-action@v4.5.0
        with:
          branch: gh-pages
          folder: dist
          target-folder: ${{ github.ref_name }}
          clean: true